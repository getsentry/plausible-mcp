name = "plausible-mcp"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat_v2"]

routes = [
  { pattern = "plausible.mcp.frontic.com", custom_domain = true }
]

[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }
