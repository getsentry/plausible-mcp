# esbuild (used by tsx + vitest) and @sentry/cli need their post-install
# scripts to fetch platform binaries; pnpm blocks build scripts by default.
onlyBuiltDependencies:
  - "@sentry/cli"
  - esbuild
allowBuilds:
  "@sentry/cli": true
  esbuild: true
  core-js-pure: false

# Force esbuild (transitive via tsx + vitest) to the patched 0.28.1 — earlier
# versions have a high-severity advisory (GHSA-gv7w-rqvm-qjhr).
# Force form-data (transitive via @anthropic-ai/sdk > @types/node-fetch) to the
# patched 4.0.6 — earlier versions have a high-severity CRLF injection advisory
# (GHSA-hmw2-7cc7-3qxx).
overrides:
  esbuild: ">=0.28.1"
  form-data: ">=4.0.6"
