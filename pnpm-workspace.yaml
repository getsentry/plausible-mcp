# esbuild (used by tsx + vitest) and @sentry/cli need their post-install
# scripts to fetch platform binaries; pnpm blocks build scripts by default.
onlyBuiltDependencies:
  - "@sentry/cli"
  - esbuild
allowBuilds:
  "@sentry/cli": true
  esbuild: true
  core-js-pure: false

# Force esbuild (transitive via tsx + vitest) to the patched 0.28.1 — earlier
# versions have a high-severity advisory (GHSA-gv7w-rqvm-qjhr).
overrides:
  esbuild: ">=0.28.1"
  # No patched 1.x exists for the @hono/node-server serve-static advisory and the
  # MCP SDK pins ^1.x. None of our transports load the Node server (the Worker uses
  # the web-standard transport, STDIO uses stdio), so the 2.x jump is inert here.
  "@hono/node-server": "^2.0.5"
